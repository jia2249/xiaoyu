<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>致小鱼的生日动画</title>
    <style>
        * {margin:0;padding:0}
        body {background:#0a1020;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;}
        canvas {border:none;max-width:100vw;max-height:100vh;}
    </style>
</head>
<body>
<canvas id="aniCanvas"></canvas>

<script>
const canvas = document.getElementById('aniCanvas');
const ctx = canvas.getContext('2d');
// 自适应画布尺寸
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// 全局动画状态
const state = {
    t: 0,
    phase: 0, // 0飞机飞行 1降落 2信纸展开 3文字显现 4淡出切海洋 5海洋游动
    plane: {x:-300,y:0,scale:0.05,rot:0},
    cloudList: [],
    paperOpen: 0, // 信纸展开进度 0折叠 1完全展开
    textAlpha:0,
    oceanAlpha:0,
    fishList:[]
};
const W = ()=>canvas.width;
const H = ()=>canvas.height;
const centerX = ()=>W()/2;
const centerY = ()=>H()/2;

// 生成云层
function initClouds(){
    state.cloudList = [];
    for(let i=0;i<12;i++){
        state.cloudList.push({
            x: Math.random()*W()*1.8 - W()*0.4,
            y: Math.random()*H()*0.6 + H()*0.15,
            r: 30 + Math.random()*60,
            speed: 0.2 + Math.random()*0.4
        })
    }
}
// 生成海洋小鱼
function initFish(){
    state.fishList = [];
    for(let i=0;i<18;i++){
        state.fishList.push({
            x: Math.random()*W(),
            y: Math.random()*H(),
            size: 8 + Math.random()*16,
            spdX: (Math.random()-0.5)*0.6,
            spdY: (Math.random()-0.5)*0.3,
            swing: Math.random()*Math.PI*2
        })
    }
}
initClouds();
initFish();

// 绘制云层
function drawCloud(c){
    ctx.save();
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.arc(c.x+c.r*0.7,c.y-c.r*0.3,c.r*0.7,0,Math.PI*2);
    ctx.arc(c.x-c.r*0.6,c.y+c.r*0.2,c.r*0.8,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
}

// 绘制纸飞机
function drawPlane(p){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.scale(p.scale,p.scale);
    ctx.rotate(p.rot);
    ctx.fillStyle = '#f8f8f8';
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(120,0);
    ctx.lineTo(-60,-45);
    ctx.lineTo(-30,0);
    ctx.lineTo(-60,45);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // 飞机折痕
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-30,0);
    ctx.lineTo(120,0);
    ctx.stroke();
    ctx.restore();
}

// 绘制带折痕信纸
function drawPaper(openRate, alpha){
    const cx = centerX();
    const cy = centerY();
    const baseW = 320;
    const baseH = 420;
    ctx.save();
    ctx.globalAlpha = alpha;
    // 信纸底色
    const grad = ctx.createLinearGradient(cx-baseW/2,cy,cx+baseW/2,cy);
    grad.addColorStop(0,'#fefefe');
    grad.addColorStop(1,'#f5f5f5');
    ctx.fillStyle = grad;
    // 折叠形变
    const foldOffset = (1-openRate)*110;
    ctx.beginPath();
    ctx.moveTo(cx - baseW/2 + foldOffset, cy - baseH/2);
    ctx.lineTo(cx + baseW/2 - foldOffset, cy - baseH/2);
    ctx.lineTo(cx + baseW/2, cy + baseH/2);
    ctx.lineTo(cx - baseW/2, cy + baseH/2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#e2e2e2';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // 多条折痕
    ctx.strokeStyle = '#ececec';
    ctx.lineWidth = 1;
    // 中间主折痕
    ctx.beginPath();
    ctx.moveTo(cx, cy-baseH/2);
    ctx.lineTo(cx, cy+baseH/2);
    ctx.stroke();
    // 横向折痕
    ctx.beginPath();
    ctx.moveTo(cx-baseW/2, cy-baseH*0.28);
    ctx.lineTo(cx+baseW/2, cy-baseH*0.28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx-baseW/2, cy+baseH*0.18);
    ctx.lineTo(cx+baseW/2, cy+baseH*0.18);
    ctx.stroke();
    ctx.restore();
}

// 手写文字绘制
function drawText(alpha){
    if(alpha <=0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#333';
    ctx.font = 'italic 26px "SimHei", cursive';
    ctx.textAlign = 'center';
    const cx = centerX();
    const cy = centerY();
    ctx.fillText('祝小鱼生日快乐', cx, cy - 60);
    ctx.font = 'italic 22px cursive';
    ctx.fillText('坚韧的🐟会找到属于自己的一片汪洋❤', cx, cy + 20);
    ctx.restore();
}

// 绘制单条小鱼
function drawFish(f, oceanA){
    ctx.save();
    ctx.globalAlpha = oceanA;
    ctx.translate(f.x,f.y);
    ctx.rotate(Math.sin(f.swing)*0.25);
    // 鱼身
    ctx.fillStyle = '#44aaff';
    ctx.beginPath();
    ctx.ellipse(0,0,f.size,f.size*0.5,0,0,Math.PI*2);
    ctx.fill();
    // 鱼尾
    ctx.beginPath();
    ctx.moveTo(-f.size,0);
    ctx.lineTo(-f.size*1.6,-f.size*0.4);
    ctx.lineTo(-f.size*1.6,f.size*0.4);
    ctx.closePath();
    ctx.fill();
    // 鱼眼
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(f.size*0.4, -f.size*0.12, f.size*0.13,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.arc(f.size*0.45, -f.size*0.12, f.size*0.06,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
}

// 动画主循环
function loop(){
    const t = state.t;
    state.t += 1;
    // 清空画布深蓝天空底色
    ctx.fillStyle = '#0b1630';
    ctx.fillRect(0,0,W(),H());

    // 更新云层位置
    state.cloudList.forEach(c=>{
        c.x -= c.speed;
        if(c.x < -c.r*2) c.x = W() + c.r;
        drawCloud(c);
    });

    // ========== 阶段0：纸飞机从远飞来，穿云层 ==========
    if(state.phase === 0){
        const dur = 320;
        const p = state.plane;
        const prog = Math.min(t/dur,1);
        // 飞行曲线轨迹，从左上远处飞向屏幕中心
        p.x = -200 + prog*(centerX()+180);
        p.y = H()*0.22 + Math.sin(prog*Math.PI*2.2)*H()*0.16;
        p.scale = 0.04 + prog*0.42;
        p.rot = Math.sin(prog*Math.PI*3)*0.12;
        drawPlane(p);
        if(prog >= 1) state.phase = 1;
    }
    // ========== 阶段1：飞机降落至屏幕中央 ==========
    else if(state.phase === 1){
        const dur = 120;
        const prog = Math.min((t-320)/dur,1);
        const p = state.plane;
        p.x += (centerX()-p.x)*0.035;
        p.y += (centerY()-p.y + 120)*0.035;
        p.scale *= 0.994;
        p.rot *= 0.94;
        drawPlane(p);
        if(prog >=1) state.phase = 2;
    }
    // ========== 阶段2：飞机消失，信纸缓慢展开 ==========
    else if(state.phase === 2){
        const dur = 160;
        const prog = Math.min((t-440)/dur,1);
        state.paperOpen = prog;
        drawPaper(state.paperOpen, 1);
        if(prog >=1) state.phase = 3;
    }
    // ========== 阶段3：手写文字缓缓浮现 ==========
    else if(state.phase ===3){
        const dur = 90;
        const prog = Math.min((t-600)/dur,1);
        state.textAlpha = prog;
        drawPaper(1,1);
        drawText(state.textAlpha);
        if(prog >=1 && t>720) state.phase =4;
    }
    // ========== 阶段4：信纸淡出，切换海洋 ==========
    else if(state.phase ===4){
        const dur = 100;
        const prog = Math.min((t-720)/dur,1);
        state.oceanAlpha = prog;
        const paperA = 1-prog;
        drawPaper(1, paperA);
        drawText(paperA);
        // 海洋底色渐变
        const oceanGrad = ctx.createLinearGradient(0,0,0,H());
        oceanGrad.addColorStop(0,'rgba(8,30,80,'+state.oceanAlpha+')');
        oceanGrad.addColorStop(1,'rgba(5,18,45,'+state.oceanAlpha+')');
        ctx.fillStyle = oceanGrad;
        ctx.fillRect(0,0,W(),H());
        // 绘制小鱼
        state.fishList.forEach(f=>{
            f.x += f.spdX;
            f.y += f.spdY;
            f.swing += 0.06;
            // 边界循环
            if(f.x < -50) f.x = W()+50;
            if(f.x > W()+50) f.x = -50;
            if(f.y < -30) f.y = H()+30;
            if(f.y > H()+30) f.y = -30;
            drawFish(f, state.oceanAlpha);
        })
        if(prog >=1) state.phase =5;
    }
    // ========== 阶段5：纯海洋，小鱼持续游动 ==========
    else if(state.phase ===5){
        // 海洋底色
        const oceanGrad = ctx.createLinearGradient(0,0,0,H());
        oceanGrad.addColorStop(0,'#082050');
        oceanGrad.addColorStop(1,'#05122d');
        ctx.fillStyle = oceanGrad;
        ctx.fillRect(0,0,W(),H());
        // 更新并绘制小鱼
        state.fishList.forEach(f=>{
            f.x += f.spdX;
            f.y += f.spdY;
            f.swing += 0.06;
            if(f.x < -50) f.x = W()+50;
            if(f.x > W()+50) f.x = -50;
            if(f.y < -30) f.y = H()+30;
            if(f.y > H()+30) f.y = -30;
            drawFish(f, 1);
        })
    }

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
